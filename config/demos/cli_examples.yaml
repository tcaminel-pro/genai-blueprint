# Example CLI commands organized by category


cli_commands:
  - name: Simple LLM query
    command: llm --input "Explain quantum computing in simple terms"
  
  - name: "Run a joke chain"
    command: run joke --input "bears" 

  - name: "List available models"
    command: list-models 

  - name: "MCP Agent shell"
    command: mcp-agent --shell 

  - name: "GPT Researcher"
    command: gpt-researcher "Latest developments in AI" 

  - name: "Browser agent"
    command: browser-agent "recent news on AI" --headless 

  - name: "Fabric pattern"
    command: fabric --pattern "create_aphorisms" 

  - name: "OCR PDF files"
    command: ocr-pdf "*.pdf" --output-dir=./ocr_results 
