  - name: "Rainbow"
    tools:
      - class: src.ai_extra.smolagents_tools:DataFrameTool
        name: "opportunity_2024"
        description: "Data related to business opportunities"
        source_path: ${paths.ekg_data}/misc/report1750429630460.xlsx
        
