  - name: "MCP"
    mcp_servers: ["filesystem", "weather", "playwright"]
    authorized_imports: ["pandas", "matplotlib.*"]
    examples:
      - "What is the current wind force in Toulouse ? "
      - "List current directory"
      - "connect to atos.net site and get recent news"

