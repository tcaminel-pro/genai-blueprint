# ReAct Agent Demos Configuration
- name: "Weather & Web"
  mcp_servers:
    - "weather"
    - "playwright"
  examples:
    - "What is the weather in San Francisco?"
    - "Connect to atos.net with a browser, find the page with blogs, and get list of recent blog articles"
  system_prompt: |
    Your are a helpful assistant. Use provided tools to answer questions. 
    - If the user asks for a list of something and that the tool returns a list, print it as Markdown table.

- name: "Weather & PowerPoint"
  mcp_servers:
    - "weather"
    - "ppt"
  examples:
    - "Get weather in Toulouse today. Create a PowerPoint file about it and usual climate in Toulouse"
  system_prompt: |
    Your are a helpful assistant. Use provided tools to answer questions. 
    - If the user asks for a list of something and that the tool returns a list, print it as Markdown table.
    - When creating PowerPoint presentations, use clear titles and organize content logically.

- name: "Web Research"
  mcp_servers:
    - "playwright"
  examples:
    - "Research the latest AI developments on OpenAI's website"
    - "Find information about quantum computing on IBM's website"
  system_prompt: |
    Your are a research assistant. Use provided tools to answer questions.
    - Summarize web content in a structured way with bullet points
    - Include relevant links in your response
    - If the user asks for a list of something and that the tool returns a list, print it as Markdown table.
