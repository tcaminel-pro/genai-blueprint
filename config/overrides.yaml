training_local:
  llm:
    models:
      default:  llama32_3_ollama
  embeddings:
    models:
      default: artic_22_ollama


training_edenai:
  llm:
    models:
      default: gpt_4omini_edenai
    cache : memory
  embeddings:
    models:
      default: ada_002_edenai

training_openrouter:
  llm:
    models:
      default: gpt_41mini_openrouter
    cache : memory
  embeddings:
    models:
      default: bge_m3_deepinfra

training_azure:
  llm:
    models:
      default: gpt_4omini_azure
  embeddings:
    models:
      default: ada_002_azure


training_openai:
  llm:
    models:
      default: gpt_4omini_openai
  embeddings:
    models:
      default: ada_002_openai
  dummy:
    bar: foo

pytest:
  llm:
    models:
      default: gpt_4omini_edenai
  embeddings:
    models:
      default: ada_002_edenai

container: 
  paths:
    data_root: /data
    project: /app
    src: ${paths.project}/src
    config: ${paths.project}/config
    demo_conf: ${paths.project}/config/demos
  llm:
    models:
      default: gpt_41mini_openrouter
    cache: sqlite
    cache_path: ${paths.data_root}/llm_cache/langchain.db
  embeddings:
    models:
      default: bge_m3_deepinfra
    cache: ${paths.data_root}/hf_models
  vector_store:
    default: Chroma
    path: ${paths.data_root}/vector_store
    table_name: "table_name"
  monitoring: 
    default:  langsmith
  external_data: ${paths.data_root}/external

ekg_local:
  llm:
    models:
      default: kimi_k2_openrouter
  embeddings:
    models:
      default: qwen3_06b_deepinfra
  vector_store:
    default : PgVector
  cli:
    commands:  
    - src.ai_core.cli_commands:register_commands
    - src.ai_extra.cli_commands:register_commands
    - src.demos.ekg.cli_commands:register_commands
    - src.demos.ekg.cli_commands_baml:register_baml_commands
  kv_store: 
    file: 
      path: ${paths.data_root}/kv_store
    sql: 
      path: ${paths.postgres}
  paths:
    ekg_data : ${oc.env:ONEDRIVE, null}/prj/atos-kg