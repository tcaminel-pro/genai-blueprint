
    <!DOCTYPE html>

me": "1800000.000000", "id": "19c47054-08c0-4e3f-bd7f-a4aa2948359e", "color": "#c464a5"}];
            var links = [{"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "e2b145e5-85c9-4d57-8541-be3f2833912c", "relation": "REVIEWS", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "45e8f783-8a96-4590-840b-f005086f4b01", "relation": "HAS_TEAM_MEMBER", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "c7e1ebd8-1617-471b-a868-e4ce9143ac97", "relation": "HAS_TEAM_MEMBER", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "0effb510-361b-412b-afd6-81c3860372bd", "relation": "HAS_TEAM_MEMBER", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "f9e2e85d-6c63-4300-b0f3-446385d4d4f1", "relation": "HAS_TEAM_MEMBER", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "0876b9b2-b50e-4ea8-8aa8-22ab47922824", "relation": "HAS_TEAM_MEMBER", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "f7fa9482-4eb7-4cc7-8019-5613c917ba4f", "relation": "HAS_TEAM_MEMBER", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "839ec3b3-7279-4f23-a3b8-d1d4d8132f31", "relation": "HAS_TEAM_MEMBER", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "051f93de-53f3-443b-9a29-15744deffce6", "relation": "HAS_TEAM_MEMBER", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "c589e712-06a1-4a3b-b345-5ec07c8bc842", "relation": "HAS_PARTNER", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "b0f70e87-a06d-48c6-842e-03a2aa0981fb", "relation": "HAS_PARTNER", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "946b59a7-fddf-42d2-8c96-c44dfa47fa8e", "relation": "HAS_RISK", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "c76c20b8-5b60-40f2-8ed8-45f5b820828a", "relation": "HAS_RISK", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "39148a7b-570c-4d07-9197-3c6326500e33", "relation": "HAS_RISK", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "c4ae7284-b578-4dc2-b3f4-3204f9c8a25c", "relation": "HAS_RISK", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "42f311cb-07e8-485f-8862-eaf399fb8989", "relation": "HAS_RISK", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "b1bcfe07-33d6-4f17-ab60-5a8ddc2f14ce", "target": "0255d563-b701-4256-9633-f241f2b440b1", "relation": "HAS_COMPETITION", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}, {"source": "e2b145e5-85c9-4d57-8541-be3f2833912c", "target": "32b66cae-98e6-4e3d-8312-054b95e01e2e", "relation": "HAS_CUSTOMER", "weight": null, "all_weights": {}, "relationship_type": null, "edge_info": {}}];

            var svg = d3.select("svg"),
                width = window.innerWidth,
                height = window.innerHeight;

            var container = svg.append("g");
            var tooltip = d3.select("#tooltip");

            var simulation = d3.forceSimulation(nodes)
                .force("link", d3.forceLink(links).id(d => d.id).strength(0.1))
                .force("charge", d3.forceManyBody().strength(-275))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("x", d3.forceX().strength(0.1).x(width / 2))
                .force("y", d3.forceY().strength(0.1).y(height / 2));

            var link = container.append("g")
                .attr("class", "links")
                .selectAll("line")
                .data(links)
                .enter().append("line")
                .attr("stroke-width", d => {
                    if (d.weight) return Math.max(2, d.weight * 5);
                    if (d.all_weights && Object.keys(d.all_weights).length > 0) {
                        var avgWeight = Object.values(d.all_weights).reduce((a, b) => a + b, 0) / Object.values(d.all_weights).length;
                        return Math.max(2, avgWeight * 5);
                    }
                    return 2;
                })
                .attr("class", d => {
                    if (d.all_weights && Object.keys(d.all_weights).length > 1) return "multi-weighted";
                    if (d.weight || (d.all_weights && Object.keys(d.all_weights).length > 0)) return "weighted";
                    return "";
                })
                .on("mouseover", function(d) {
                    // Create tooltip content for edge
                    var content = "<strong>Edge Information</strong><br/>";
                    content += "Relationship: " + d.relation + "<br/>";

                    // Show all weights
                    if (d.all_weights && Object.keys(d.all_weights).length > 0) {
                        content += "<strong>Weights:</strong><br/>";
                        Object.keys(d.all_weights).forEach(function(weightName) {
                            content += "&nbsp;&nbsp;" + weightName + ": " + d.all_weights[weightName] + "<br/>";
                        });
                    } else if (d.weight !== null && d.weight !== undefined) {
                        content += "Weight: " + d.weight + "<br/>";
                    }

                    if (d.relationship_type) {
                        content += "Type: " + d.relationship_type + "<br/>";
                    }
                    // Add other edge properties
                    if (d.edge_info) {
                        Object.keys(d.edge_info).forEach(function(key) {
                            if (key !== 'weight' && key !== 'weights' && key !== 'relationship_type' && 
                                key !== 'source_node_id' && key !== 'target_node_id' && 
                                key !== 'relationship_name' && key !== 'updated_at' && 
                                !key.startsWith('weight_')) {
                                content += key + ": " + d.edge_info[key] + "<br/>";
                            }
                        });
                    }

                    tooltip.html(content)
                        .style("left", (d3.event.pageX + 10) + "px")
                        .style("top", (d3.event.pageY - 10) + "px")
                        .style("opacity", 1);
                })
                .on("mouseout", function(d) {
                    tooltip.style("opacity", 0);
                });

            var edgeLabels = container.append("g")
                .attr("class", "edge-labels")
                .selectAll("text")
                .data(links)
                .enter().append("text")
                .attr("class", "edge-label")
                .text(d => {
                    var label = d.relation;
                    if (d.all_weights && Object.keys(d.all_weights).length > 1) {
                        // Show count of weights for multiple weights
                        label += " (" + Object.keys(d.all_weights).length + " weights)";
                    } else if (d.weight) {
                        label += " (" + d.weight + ")";
                    } else if (d.all_weights && Object.keys(d.all_weights).length === 1) {
                        var singleWeight = Object.values(d.all_weights)[0];
                        label += " (" + singleWeight + ")";
                    }
                    return label;
                });

            var nodeGroup = container.append("g")
                .attr("class", "nodes")
                .selectAll("g")
                .data(nodes)
                .enter().append("g");

            var node = nodeGroup.append("circle")
                .attr("r", 13)
                .attr("fill", d => d.color)
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended));

            nodeGroup.append("text")
                .attr("class", "node-label")
                .attr("dy", 4)
                .attr("text-anchor", "middle")
                .text(d => d.name);

            node.append("title").text(d => JSON.stringify(d));

            simulation.on("tick", function() {
                link.attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                edgeLabels
                    .attr("x", d => (d.source.x + d.target.x) / 2)
                    .attr("y", d => (d.source.y + d.target.y) / 2 - 5);

                // FIXED: Use nodeGroup for positioning, not individual circles
                nodeGroup.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
            });

            svg.call(d3.zoom().on("zoom", function() {
                container.attr("transform", d3.event.transform);
            }));

            function dragstarted(d) {
                if (!d3.event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x;
                d.fy = d.y;
            }

            function dragged(d) {
                d.fx = d3.event.x;
                d.fy = d3.event.y;
            }

            function dragended(d) {
                if (!d3.event.active) simulation.alphaTarget(0);
                d.fx = null;
                d.fy = null;
            }

            window.addEventListener("resize", function() {
                width = window.innerWidth;
                height = window.innerHeight;
                svg.attr("width", width).attr("height", height);
                simulation.force("center", d3.forceCenter(width / 2, height / 2));
                simulation.alpha(1).restart();
            });
        </script>
    </body>
    </html>
